{{ define "main" }}
  <div class='hx:mx-auto hx:flex hextra-max-page-width'>
    {{ partial "sidebar.html" (dict "context" . "disableSidebar" true "displayPlaceholder" true) }}
    <article class="hx:w-full hx:break-words hx:flex hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:justify-center hx:pb-8">
      <main id="content" class="hx:w-full hx:min-w-0 hextra-max-content-width hx:px-6 hx:pt-4 hx:md:px-12">
        <h1 class="hx:mt-2 hx:text-4xl hx:font-bold hx:tracking-tight">{{ .Title }}</h1>
        <div class="hx:mt-6 hx:flex hx:flex-wrap hx:gap-2">
          {{ range .Data.Terms.ByCount }}
            <a href="{{ .Page.RelPermalink }}"
               class="hx:inline-flex hx:items-center hx:rounded-md hx:px-3 hx:py-1.5 hx:text-sm hx:font-medium hx:transition-colors hx:bg-gray-100 hx:text-gray-700 hx:hover:bg-primary-100 hx:hover:text-primary-800 hx:dark:bg-neutral-800 hx:dark:text-gray-300 hx:dark:hover:bg-primary-400/10 hx:dark:hover:text-primary-500">
              {{ .Page.Title }}
              <span class="hx:ml-1.5 hx:text-xs hx:text-gray-500 hx:dark:text-gray-400">({{ .Count }})</span>
            </a>
          {{ end }}
        </div>
      </main>
    </article>
  </div>
{{ end }}
